<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Data Type Arranger</title>
<style>
body{ margin:0; padding:20px; font-family:Arial, sans-serif; background:#121212; color:white; }
h2{ text-align:center; }
input{ width:91%; padding:12px; font-size:16px; border-radius:6px; border:none; margin-bottom:15px; }
button{ padding:10px 20px; font-size:16px; border:none; border-radius:6px; background:#4CAF50; color:white; cursor:pointer; }
button:hover{ background:#45a049; }
.section{ margin-top:30px; }
table{ width:100%; border-collapse:collapse; margin-top:10px; }
td{ border:1px solid #333; padding:10px; text-align:center; background:#1e1e1e; }
</style>
</head>
<body>
<h2>Smart Data Type Arranger</h2>
<input type="text" id="dataInput" placeholder="Enter comma separated values">
<button onclick="arrangeData()">Arrange</button>
<div id="output"></div>
<script>
function findBestLayout(n){
    let best = { rows:n, cols:1, empty:Infinity, squareness:Infinity };
    for(let cols = 1; cols <= n; cols++){
        let rows = Math.ceil(n / cols);
        let empty = rows * cols - n;
        let squareness = Math.abs(rows - cols);
        if(
            empty < best.empty ||
            (empty === best.empty && squareness < best.squareness)
        ){
            best = { rows, cols, empty, squareness };
        }
    }
    return best;
}
function buildTable(values, title){
    if(values.length === 0) return "";
    let layout = findBestLayout(values.length);
    let index = 0;
    let html = `<div class="section"><h3>${title}</h3><table>`;
    for(let r = 0; r < layout.rows; r++){
        html += "<tr>";
        for(let c = 0; c < layout.cols; c++){
            html += `<td>${values[index] || ""}</td>`;
            index++;
        }
        html += "</tr>";
    }
    html += "</table></div>";
    return html;
}
function arrangeData(){
    const input = document.getElementById("dataInput").value.trim();
    const output = document.getElementById("output");
    if(!input){
        output.innerHTML = "";
        return;
    }
    let values = input.split(",")
                      .map(v => v.trim())
                      .filter(v => v !== "");
    let alphabets = [];
    let numbers = [];
    let symbols = [];
    values.forEach(val => {
        if(/^[a-zA-Z]+$/.test(val)){
            alphabets.push(val);
        }
        else if(/^[0-9]+$/.test(val)){
            numbers.push(val);
        }
        else{
            symbols.push(val);
        }
    });
    output.innerHTML =
        buildTable(alphabets, "Alphabets") +
        buildTable(numbers, "Numbers") +
        buildTable(symbols, "Symbols");
}
</script>
</body>
</html>
